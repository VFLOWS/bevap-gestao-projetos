<main id="main-content" class="pt-32 pb-16 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto" data-page="solicitationDetail">
    <div class="mb-6 flex items-start justify-between gap-4">
        <div>
            <h2 class="text-2xl font-montserrat font-bold text-bevap-navy">Detalhamento da Solicita&ccedil;&atilde;o</h2>
            <p class="text-sm text-gray-600 mt-1">Acompanhe os dados cadastrados e o status atual da sua solicita&ccedil;&atilde;o sem sair da widget.</p>
        </div>
        <button data-action="back-dashboard" class="px-4 py-2.5 border border-gray-300 text-gray-700 rounded-lg font-medium hover:bg-gray-50 transition-all whitespace-nowrap">
            <i class="fa-solid fa-arrow-left mr-2"></i> Voltar ao Dashboard
        </button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
                <div class="flex items-start">
                    <i class="fa-solid fa-circle-info text-blue-600 mt-0.5 mr-3"></i>
                    <div class="text-sm text-blue-800">
                        <p class="font-medium mb-1">Visualiza&ccedil;&atilde;o da Solicita&ccedil;&atilde;o</p>
                        <p>Os dados abaixo refletem o conte&uacute;do da solicita&ccedil;&atilde;o atualmente vinculada ao processo no Fluig.</p>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow-md p-6">
                <div data-component="solicitation-detail-content" class="space-y-6">
                    <div class="text-sm text-gray-500">Carregando conteúdo...</div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-1">
            <div class="sticky top-24 space-y-4">
                <div data-component="project-summary"></div>
            </div>
        </div>
    </div>
</main>

<div id="solicitation-detail-toast" class="hidden fixed top-20 right-4 bg-white shadow-lg rounded-lg p-4 z-50 border-l-4 border-bevap-green">
    <div class="flex items-center">
        <i class="fa-solid fa-check-circle text-bevap-green text-xl mr-3"></i>
        <span class="text-sm font-medium text-gray-900" id="solicitation-detail-toast-message">Acao realizada com sucesso.</span>
    </div>
</div>
