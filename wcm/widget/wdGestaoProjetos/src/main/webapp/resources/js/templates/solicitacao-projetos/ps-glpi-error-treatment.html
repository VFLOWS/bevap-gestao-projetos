<main id="main-content" class="pt-32 pb-24 px-4 sm:px-6 lg:px-8 max-w-5xl mx-auto" data-page="glpiErrorTreatment">
  <div class="mb-6 bg-amber-50 border border-amber-200 rounded-lg p-4">
    <div class="flex items-start">
      <i class="fa-solid fa-triangle-exclamation text-amber-600 mt-0.5 mr-3"></i>
      <div class="text-sm text-amber-800">
        <p class="font-medium mb-1">Tratar Erro - Integrar GLPI - Projetos</p>
        <p>Confira as informações retornadas da integracao antes de reenviar para o próximo passo.</p>
      </div>
    </div>
  </div>

  <div class="bg-white rounded-lg shadow-md overflow-hidden">
    <div class="border-b border-gray-200 bg-gray-50">
      <nav class="flex">
        <button type="button" class="px-6 py-4 text-sm font-medium border-b-2 border-bevap-green text-bevap-navy">
          <i class="fa-solid fa-screwdriver-wrench mr-2"></i>Tratar Erro
        </button>
      </nav>
    </div>

    <div class="p-6 space-y-6">
      <div class="bg-blue-50 border border-blue-200 rounded-lg px-4 py-3 text-sm text-blue-800">
        <i class="fa-solid fa-circle-info mr-2"></i>
        Campos apenas para consulta nesta etapa.
      </div>

      <div>
        <label for="glpi-status-input" class="block text-sm font-medium text-gray-700 mb-2">Status</label>
        <input id="glpi-status-input" type="text" readonly class="w-full px-4 py-2.5 border border-gray-300 rounded-lg bg-gray-100 text-gray-700 cursor-not-allowed">
      </div>

      <div>
        <label for="glpi-error-message-input" class="block text-sm font-medium text-gray-700 mb-2">Mensagem erro GLPI</label>
        <textarea id="glpi-error-message-input" rows="6" readonly class="w-full px-4 py-2.5 border border-gray-300 rounded-lg bg-gray-100 text-gray-700 cursor-not-allowed resize-none"></textarea>
      </div>
    </div>
  </div>
</main>

<footer id="footer" class="fixed bottom-0 left-0 right-0 bg-white border-t shadow-lg z-40">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
    <div class="flex items-center justify-end">
      <button data-action="send-task" class="px-6 py-2.5 text-sm font-medium text-white bg-bevap-green rounded-lg hover:bg-green-700 transition-all shadow-md">
        <i class="fa-solid fa-paper-plane mr-2"></i>Enviar
      </button>
    </div>
  </div>
</footer>

<div id="toast" class="hidden fixed top-20 right-4 bg-white rounded-lg shadow-xl border-l-4 p-4 z-50 max-w-sm">
  <div class="flex items-center">
    <i id="toast-icon" class="fa-solid fa-circle-info text-blue-500 text-2xl mr-3"></i>
    <div>
      <p id="toast-title" class="font-medium text-gray-900">Informacao</p>
      <p id="toast-message" class="text-sm text-gray-600"></p>
    </div>
  </div>
</div>
